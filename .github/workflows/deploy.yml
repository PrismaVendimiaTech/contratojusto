name: Deploy to turismo

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        run: |
          curl -sS -X POST \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"${{ secrets.DOKPLOY_APP_ID }}"}' \
            "${{ secrets.DOKPLOY_URL }}/api/application.deploy"

      - name: Wait for deploy to complete
        run: sleep 120

      - name: Health check
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" https://contratojusto.nuestrascuentitas.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"
